name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: schemapilot_test
          POSTGRES_USER: schemapilot
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 3s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-asyncio

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql+asyncpg://schemapilot:test@localhost:5432/schemapilot_test
          DATABASE_URL_SYNC: postgresql://schemapilot:test@localhost:5432/schemapilot_test
          ADMIN_SECRET: ci-secret
          FRONTEND_ORIGINS: http://localhost:5173
          REGISTRY_PATH: /tmp/apis.yaml
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://schemapilot:test@localhost:5432/schemapilot_test
          DATABASE_URL_SYNC: postgresql://schemapilot:test@localhost:5432/schemapilot_test
          ADMIN_SECRET: ci-secret
          FRONTEND_ORIGINS: http://localhost:5173
          REGISTRY_PATH: /tmp/apis.yaml
        run: pytest -v

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_BASE_URL: https://placeholder.example.com

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t schemapilot-backend ./backend

      - name: Build frontend image
        run: docker build --build-arg VITE_API_BASE_URL=https://placeholder.example.com -t schemapilot-frontend ./frontend

      - name: Build drift-simulator image
        run: docker build -t schemapilot-simulator ./drift-simulator
